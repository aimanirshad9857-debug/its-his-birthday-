<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday 🎉</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4">

  <div class="bg-white shadow-2xl rounded-2xl p-6 sm:p-8 max-w-md w-full text-center">

    <!-- Heading -->
    <h1 class="text-3xl sm:text-4xl font-extrabold text-pink-500 mb-4">
      🎂 Happy Birthday Ahsaan 🎂
    </h1>

    <!-- SINGLE IMAGE -->
    <img src="ahsan.jpg"
      class="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full object-cover border-4 border-pink-400 shadow-lg mb-4">

    <!-- Message -->
    <p class="text-base sm:text-lg text-gray-700 mb-6">
      Some people don’t just enter your life, they quietly make it better.
      You’re one of those rare ones. 
      I hope this year brings you peace, happiness, and moments that stay with you forever.
    </p>

    <div class="text-5xl sm:text-6xl mb-6">🎉🎈🎁</div>

    <p class="text-gray-600 italic text-sm sm:text-base">
      "You make ordinary days feel a little more special."
    </p>

    <button onclick="celebrate()"
      class="mt-6 px-6 py-3 bg-pink-500 text-white rounded-xl shadow hover:bg-pink-600 transition">
      Click for a Surprise 🎊
    </button>

    <p id="surprise"
      class="mt-4 text-lg sm:text-xl font-semibold text-purple-600 hidden">
      Stay amazing, always ✨
    </p>

  </div>

  <script>
    function celebrate() {
      document.getElementById('surprise').classList.remove('hidden');

      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      });
    }
  </script>

</body>
</html>
